# ===============================
# CONFIGURACOES GERAIS DA APLICACAO
# ===============================
spring.application.name=biblioteca

# ===============================
# BANCO DE DADOS E CONEXAO
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# FLYWAY (MIGRATIONS)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# JPA / HIBERNATE
# ===============================
# validate garante que o Hibernate nao altera o banco, apenas verifica se as Entidades estao corretas.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Desliga o OSIV para melhorar a desempenho da API REST
spring.jpa.open-in-view=false

# ===============================
# CONFIGURACOES DO JACKSON (JSON)
# ===============================
# Nao envia campos nulos no JSON de resposta
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

